<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식 조립형 연습</title>
    <style>
        /* CSS: 디자인 및 레이아웃 */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --success-color: #7ed321;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 2.5rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #e1e8ed;
            padding: 10px;
            border-radius: 10px;
        }

        /* 문제 표시 영역 */
        .question-box {
            text-align: center;
            margin: 40px 0;
            padding: 20px;
            border: 3px dashed var(--primary-color);
            border-radius: 15px;
            background: #f9fbff;
        }

        .question-text {
            font-size: 3rem;
            font-weight: 800;
        }

        /* 답안 조립 영역 */
        .answer-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
            text-align: center;
        }

        .answer-area {
            min-height: 100px;
            border: 3px solid var(--secondary-color);
            border-radius: 15px;
            background-color: #fff9f0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 15px;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }

        .answer-area.drag-over {
            background-color: #ffe8cc;
        }

        /* 선택지 카드 영역 */
        .choices-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: #f1f3f5;
            border-radius: 15px;
            min-height: 150px;
        }

        /* 카드 공통 스타일 */
        .card {
            background: var(--card-bg);
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px 25px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .card:active {
            transform: scale(0.95);
        }

        /* 버튼 영역 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-submit:hover {
            background-color: #357abd;
        }

        .btn-next {
            background-color: var(--success-color);
            color: white;
            display: none; /* 정답 후에만 표시 */
        }

        .btn-next:hover {
            background-color: #69b01c;
        }

        /* 메시지 및 힌트 */
        .feedback {
            text-align: center;
            margin-top: 20px;
            min-height: 60px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .hint {
            color: #d9534f;
            background: #fdf2f2;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        /* 결과 화면 오버레이 */
        #result-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #result-screen h2 {
            font-size: 4rem;
            color: var(--primary-color);
        }

        #result-screen p {
            font-size: 2rem;
            margin: 20px 0;
        }

        .btn-restart {
            background-color: var(--secondary-color);
            color: white;
        }

        /* 반응형 설정 */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .question-text { font-size: 2rem; }
            .card { font-size: 1.2rem; padding: 10px 15px; }
            button { width: 100%; padding: 12px; }
        }

        /* 수식 첨자 스타일 */
        sup {
            font-size: 0.6em;
            vertical-align: super;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🧮 곱셈공식 조립하기</h1>
            <div class="stats">
                <span>진행: <span id="current-idx">1</span> / <span id="total-cnt">10</span></span>
                <span>점수: <span id="score">0</span></span>
            </div>
        </header>

        <div class="question-box">
            <div class="question-text" id="question">준비중...</div>
        </div>

        <div class="answer-section">
            <div class="section-title">아래 카드를 드래그하거나 클릭하여 답안을 완성하세요 (클릭하면 제거)</div>
            <div id="answer-area" class="answer-area" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- 조립된 카드가 들어갈 자리 -->
            </div>
        </div>

        <div class="choices-section">
            <div class="section-title">선택지 카드</div>
            <div id="choices-area" class="choices-area">
                <!-- 문제마다 랜덤 생성될 카드들 -->
            </div>
        </div>

        <div class="feedback">
            <div id="msg">정답을 조립해보세요!</div>
            <div id="hint-box" class="hint"></div>
        </div>

        <div class="controls">
            <button class="btn-submit" id="submit-btn" onclick="checkAnswer()">답 제출하기</button>
            <button class="btn-next" id="next-btn" onclick="nextQuestion()">다음 문제</button>
        </div>
    </div>

    <!-- 최종 결과 화면 -->
    <div id="result-screen">
        <h2>🎉 완료!</h2>
        <p>최종 점수: <span id="final-score">0</span> / 100</p>
        <button class="btn-restart" onclick="location.reload()">다시 도전하기</button>
    </div>

    <script>
        /**
         * 문제 은행 (questionBank)
         * q: 문제 식
         * correct: 정답 카드들의 순서 배열
         * choices: 정답과 오답을 섞은 전체 선택지 카드 (최대 15개 권장)
         * hint: 오답 시 보여줄 힌트
         */
        const questionBank = [
            {
                q: "(a + b)<sup>2</sup>",
                correct: ["a<sup>2</sup>", "+", "2ab", "+", "b<sup>2</sup>"],
                choices: ["a<sup>2</sup>", "+", "2ab", "+", "b<sup>2</sup>", "a", "b", "2a", "2b", "ab", "a<sup>2</sup>b<sup>2</sup>", "-"],
                hint: "(a+b)² = a² + 2ab + b² 공식을 기억하세요."
            },
            {
                q: "(a - b)<sup>2</sup>",
                correct: ["a<sup>2</sup>", "-", "2ab", "+", "b<sup>2</sup>"],
                choices: ["a<sup>2</sup>", "-", "2ab", "+", "b<sup>2</sup>", "2ab", "-", "a<sup>2</sup>b<sup>2</sup>", "a<sup>2</sup>-b<sup>2</sup>", "2a", "b"],
                hint: "중간항의 부호는 -이고, 마지막 상수항(b²)의 부호는 +입니다."
            },
            {
                q: "(a + b)(a - b)",
                correct: ["a<sup>2</sup>", "-", "b<sup>2</sup>"],
                choices: ["a<sup>2</sup>", "-", "b<sup>2</sup>", "+", "2ab", "a<sup>2</sup>+b<sup>2</sup>", "ab", "a-b", "2a", "2b"],
                hint: "합차 공식입니다. 중간항이 사라지고 제곱의 차만 남습니다."
            },
            {
                q: "(x + 3)(x + 5)",
                correct: ["x<sup>2</sup>", "+", "8x", "+", "15"],
                choices: ["x<sup>2</sup>", "+", "8x", "+", "15", "x", "8", "15x", "2x", "2x<sup>2</sup>", "3x", "5x"],
                hint: "상수항의 합(3+5)은 x의 계수가 되고, 곱(3×5)은 상수항이 됩니다."
            },
            {
                q: "(2x + 3)<sup>2</sup>",
                correct: ["4x<sup>2</sup>", "+", "12x", "+", "9"],
                choices: ["4x<sup>2</sup>", "+", "12x", "+", "9", "2x<sup>2</sup>", "6x", "3x", "4x", "12", "6"],
                hint: "(2x)² = 4x² 이고, 중간항은 2 × (2x) × 3 입니다."
            },
            {
                q: "(x - 4)(x + 5)",
                correct: ["x<sup>2</sup>", "+", "x", "-", "20"],
                choices: ["x<sup>2</sup>", "+", "x", "-", "20", "-", "x", "20", "9x", "-9x", "x<sup>2</sup>-x-20"],
                hint: "(-4) + (+5) = +1 이므로 일차항은 +x입니다."
            },
            {
                q: "(3a - b)<sup>2</sup>",
                correct: ["9a<sup>2</sup>", "-", "6ab", "+", "b<sup>2</sup>"],
                choices: ["9a<sup>2</sup>", "-", "6ab", "+", "b<sup>2</sup>", "3a<sup>2</sup>", "6a", "3ab", "2ab", "9a", "-3ab"],
                hint: "(3a)² = 9a² 이고, 중간항은 2 × 3a × (-b) 입니다."
            },
            {
                q: "(2x + 1)(2x - 1)",
                correct: ["4x<sup>2</sup>", "-", "1"],
                choices: ["4x<sup>2</sup>", "-", "1", "+", "4x", "2x<sup>2</sup>", "2", "4x-1", "1<sup>2</sup>"],
                hint: "합차 공식: (A+B)(A-B) = A² - B² 를 적용해보세요."
            },
            {
                q: "(x - 7)(x + 3)",
                correct: ["x<sup>2</sup>", "-", "4x", "-", "21"],
                choices: ["x<sup>2</sup>", "-", "4x", "-", "21", "+", "4x", "10x", "-10x", "21", "x<sup>2</sup>-21"],
                hint: "(-7) + (+3) = -4 이고, (-7) × (+3) = -21 입니다."
            },
            {
                q: "(5x + 2)<sup>2</sup>",
                correct: ["25x<sup>2</sup>", "+", "20x", "+", "4"],
                choices: ["25x<sup>2</sup>", "+", "20x", "+", "4", "10x<sup>2</sup>", "10x", "25x", "20", "7x", "4x"],
                hint: "(5x)² = 25x² 이고, 중간항은 2 × 5x × 2 입니다."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let userAnswer = [];

        // 초기화 함수
        function init() {
            renderQuestion();
            document.getElementById('total-cnt').innerText = questionBank.length;
        }

        // 문제 렌더링
        function renderQuestion() {
            const currentQ = questionBank[currentIdx];
            document.getElementById('question').innerHTML = currentQ.q;
            document.getElementById('current-idx').innerText = currentIdx + 1;
            document.getElementById('score').innerText = score;
            document.getElementById('msg').innerText = "카드를 드래그하거나 클릭하여 정답을 완성하세요!";
            document.getElementById('msg').style.color = "inherit";
            document.getElementById('hint-box').style.display = "none";
            document.getElementById('submit-btn').style.display = "inline-block";
            document.getElementById('next-btn').style.display = "none";
            
            // 답안 영역 및 상태 초기화
            userAnswer = [];
            updateAnswerArea();

            // 선택지 카드 셔플 및 생성
            const choicesArea = document.getElementById('choices-area');
            choicesArea.innerHTML = '';
            
            // 배열 복사 후 셔플 (Fisher-Yates)
            let shuffledChoices = [...currentQ.choices];
            for (let i = shuffledChoices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledChoices[i], shuffledChoices[j]] = [shuffledChoices[j], shuffledChoices[i]];
            }

            shuffledChoices.forEach((text, index) => {
                const card = createCard(text, index);
                choicesArea.appendChild(card);
            });
        }

        // 카드 엘리먼트 생성
        function createCard(text, id) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = text;
            div.draggable = true;
            div.dataset.value = text;
            
            // 드래그 이벤트
            div.ondragstart = (e) => {
                e.dataTransfer.setData("text", text);
            };

            // 클릭 이벤트 (답안 추가)
            div.onclick = () => {
                addCardToAnswer(text);
            };

            return div;
        }

        // 답안 영역에 카드 추가
        function addCardToAnswer(text) {
            userAnswer.push(text);
            updateAnswerArea();
        }

        // 답안 영역에서 카드 제거
        function removeCardFromAnswer(index) {
            userAnswer.splice(index, 1);
            updateAnswerArea();
        }

        // 답안 영역 UI 업데이트
        function updateAnswerArea() {
            const area = document.getElementById('answer-area');
            area.innerHTML = '';
            
            userAnswer.forEach((text, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = text;
                card.onclick = () => removeCardFromAnswer(index);
                area.appendChild(card);
            });

            if (userAnswer.length === 0) {
                area.innerHTML = '<span style="color: #ccc; font-size: 1.2rem;">이곳에 조립됩니다...</span>';
            }
        }

        // 드래그 앤 드롭 핸들러
        function allowDrop(e) {
            e.preventDefault();
            document.getElementById('answer-area').classList.add('drag-over');
        }

        function drop(e) {
            e.preventDefault();
            document.getElementById('answer-area').classList.remove('drag-over');
            const data = e.dataTransfer.getData("text");
            if (data) {
                addCardToAnswer(data);
            }
        }

        // 드래그 떠날 때 스타일 제거
        document.getElementById('answer-area').ondragleave = () => {
            document.getElementById('answer-area').classList.remove('drag-over');
        };

        // 채점 기능
        function checkAnswer() {
            const currentQ = questionBank[currentIdx];
            const isCorrect = (JSON.stringify(userAnswer) === JSON.stringify(currentQ.correct));

            if (isCorrect) {
                score += 10;
                document.getElementById('score').innerText = score;
                document.getElementById('msg').innerText = "✨ 정답입니다! 아주 잘했어요! ✨";
                document.getElementById('msg').style.color = "var(--success-color)";
                document.getElementById('hint-box').style.display = "none";
                document.getElementById('submit-btn').style.display = "none";
                document.getElementById('next-btn').style.display = "inline-block";
            } else {
                document.getElementById('msg').innerText = "❌ 다시 한번 생각해보세요!";
                document.getElementById('msg').style.color = "#d9534f";
                document.getElementById('hint-box').innerText = "💡 힌트: " + currentQ.hint;
                document.getElementById('hint-box').style.display = "block";
            }
        }

        // 다음 문제로 이동
        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questionBank.length) {
                renderQuestion();
            } else {
                showFinalResult();
            }
        }

        // 최종 결과 표시
        function showFinalResult() {
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
        }

        // 실행 시작
        init();
    </script>
</body>
</html>
